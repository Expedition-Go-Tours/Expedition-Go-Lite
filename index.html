<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicons for different devices and use cases -->
    <!-- SVG favicon (modern browsers, scales perfectly) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Standard favicons (fallback for older browsers) -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    
    <!-- Legacy ICO format (IE and old browsers) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Android Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    
    <!-- Web App Manifest (PWA support) -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#ffffff" />
    
    <title>Expedition-Go Tours</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
